name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: secrets.SIGNING_KEY != ''
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Copy web assets to www
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Place google-services.json
        if: secrets.GOOGLE_SERVICES_JSON != ''
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Accept Android licenses & install SDK 35
        run: |
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses || true
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x test

      - name: Sign APK
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > /tmp/keystore.jks
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          SIGNED=seoraksan-signed.apk
          ${ANDROID_SDK_ROOT}/build-tools/35.0.0/apksigner sign \
            --ks /tmp/keystore.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEY_STORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out $SIGNED \
            $UNSIGNED
          echo "signed_apk=$SIGNED" >> $GITHUB_ENV

      - name: Get version
        id: version
        run: echo "version=$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Seoraksan v${{ steps.version.outputs.version }}"
          body: "APK build ${{ steps.version.outputs.version }}"
          files: seoraksan-signed.apk
          make_latest: true
