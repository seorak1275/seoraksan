name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

# 같은 브랜치에서 연속 push 시 이전 빌드는 취소 (런 쌓임 방지)
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT

      # 안드로이드 versionCode/versionName을 빌드마다 증가 — 고정(2/"1.1")이면 Capgo OTA가
      # '네이티브 앱이 교체됐다'를 감지하지 못해, 새 APK를 덮어 설치해도 기기에 저장된
      # 예전 OTA 번들(예: 2026.06.29.60)을 계속 사용하는 문제의 원인이었음.
      - name: Stamp Android version
        run: |
          VC=$(date +%y%m%d%H)
          sed -i -E "s/versionCode [0-9]+/versionCode $VC/" android/app/build.gradle
          sed -i -E "s/versionName \"[^\"]*\"/versionName \"v${{ steps.version.outputs.version }}\"/" android/app/build.gradle
          grep -nE "versionCode|versionName" android/app/build.gradle || true

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Stamp app version
        run: sed -i "s/const APP_VER='v0';/const APP_VER='v${{ steps.version.outputs.version }}';/" index.html

      - name: Copy web assets to www
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Sync Capacitor
        run: npx cap sync android

      # google-services.json: 시크릿이 있고 + 유효한 JSON + 패키지명이 맞을 때만 적용.
      # 그 외(미설정/형식오류/패키지불일치)에는 파일을 두지 않아 build.gradle이 플러그인을
      # 자동 skip → FCM만 빠진 채 빌드는 정상 성공 (예전처럼 빌드가 통째로 깨지지 않게).
      - name: Place google-services.json (best-effort)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -e
          PKG="kr.go.nps.seoraksan"
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::warning::GOOGLE_SERVICES_JSON 시크릿 미설정 — FCM 없이 빌드합니다."
            exit 0
          fi
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          if ! python3 -c "import json,sys; json.load(open('android/app/google-services.json'))" 2>/dev/null; then
            echo "::warning::google-services.json 이 유효한 JSON 이 아님 — 제거하고 FCM 없이 빌드합니다."
            rm -f android/app/google-services.json
            exit 0
          fi
          if ! grep -q "$PKG" android/app/google-services.json; then
            echo "::warning::google-services.json 에 패키지명($PKG) 이 없음 — 제거하고 FCM 없이 빌드합니다."
            rm -f android/app/google-services.json
            exit 0
          fi
          echo "google-services.json 적용 완료 (FCM 활성)."

      - name: Accept Android licenses & install SDK 35
        run: |
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses || true
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x test --stacktrace

      # secrets 컨텍스트는 if: 에서 못 쓰므로(=startup_failure 원인) 여기서 검사해 output 으로 전달
      - name: Check signing secret
        id: sign
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SIGNING_KEY 시크릿 미설정 — 서명/릴리즈를 건너뜁니다."
          fi

      - name: Sign APK
        if: steps.sign.outputs.available == 'true'
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > /tmp/keystore.jks
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          SIGNED=seoraksan-signed.apk
          ${ANDROID_SDK_ROOT}/build-tools/35.0.0/apksigner sign \
            --ks /tmp/keystore.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEY_STORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out $SIGNED \
            $UNSIGNED
          echo "signed_apk=$SIGNED" >> $GITHUB_ENV

# 릴리즈 게시가 실패해도(예: GitHub Releases API 장애) 서명된 APK를 받을 수 있는 백업 경로
      - name: Upload APK artifact (릴리즈 실패 대비 백업)
        if: steps.sign.outputs.available == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: seoraksan-signed-apk
          path: seoraksan-signed.apk
          retention-days: 14

      # 릴리즈 게시 — API 일시 장애(0초 실패)에 견디도록 5회×30초 재시도.
      # 같은 태그가 이미 있으면(부분 성공 후 재실행) 생성 대신 업로드로 이어붙임.
      - name: Create Release
        if: steps.sign.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VER: v${{ steps.version.outputs.version }}
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          cat > /tmp/relnotes.md <<EOF
          ## 설악산 현장관리 앱

          ### 설치 방법
          1. 아래 **seoraksan-signed.apk** 파일 다운로드
          2. 안드로이드 설정 → 보안 → **출처를 알 수 없는 앱 허용** 켜기
          3. 다운로드된 APK 실행하여 설치

          ### 변경사항
          ${HEAD_MSG:-수동 실행(workflow_dispatch)}
          EOF
          publish() {
            if gh release view "$VER" >/dev/null 2>&1; then
              gh release upload "$VER" seoraksan-signed.apk --clobber && gh release edit "$VER" --latest
            else
              gh release create "$VER" seoraksan-signed.apk --latest --title "설악산 현장관리 $VER" --notes-file /tmp/relnotes.md
            fi
          }
          for i in 1 2 3 4 5; do
            if publish; then echo "✅ 릴리즈 게시 완료: $VER"; exit 0; fi
            echo "⚠️ 릴리즈 시도 $i 실패 — 30초 후 재시도"
            sleep 30
          done
          echo "::error::릴리즈 게시 5회 실패 — GitHub Releases 장애로 보임. APK는 workflow 아티팩트(seoraksan-signed-apk)에 백업돼 있고, 다음 main 푸시에서 자동 재시도됩니다."
          exit 1
