<!DOCTYPE html>
<!--
  ============================================================================
  설악산 안전사고 보고서 자동작성 도구 (report.html)
  ----------------------------------------------------------------------------
  - 목적 : Excel 안전사고 데이터에서 사고 1건을 골라 한글(HWP) 양식대로
           표를 만들고, '한글로 복사' 버튼으로 한글에 그대로 붙여넣는다.
  - 양식 : 서식2호(탐방객 구조출동 현황), 서식1호(탐방객 안전지원 활동 현황)
  - 원칙 : 외부 라이브러리 0개, 한 파일 완결, 한글 주석, 방어적 코드.
           (누구나 열어보고 고칠 수 있게 단순하게 작성)
  - 데이터: 아래 <script id="DATA"> 안에 사고기록 JSON이 내장되어 있다.
            데이터 갱신은 같은 형식의 JSON으로 그 부분만 교체하면 된다.
  ============================================================================
-->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>설악산 안전사고 보고서 자동작성</title>
<style>
  /* ---- 전체 기본 ---- */
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "맑은 고딕", "Malgun Gothic", AppleSDGothicNeo-Regular, sans-serif;
    color: #222; background: #eef1f5; font-size: 14px;
  }
  h1 { margin: 0; font-size: 18px; }
  /* ---- 상단 머리글 ---- */
  header {
    background: #1f4e79; color: #fff; padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
  }
  header .sub { font-size: 12px; opacity: .85; }
  /* ---- 2단 레이아웃 ---- */
  .wrap { display: flex; gap: 14px; padding: 14px; align-items: flex-start; }
  .panel { background: #fff; border: 1px solid #cfd6df; border-radius: 6px; }
  #leftPanel { flex: 0 0 460px; max-width: 460px; }
  #rightPanel { flex: 1 1 auto; min-width: 0; }
  .panel h2 {
    font-size: 14px; margin: 0; padding: 10px 12px;
    background: #f3f6fa; border-bottom: 1px solid #dde3ea; border-radius: 6px 6px 0 0;
  }
  /* ---- 필터 ---- */
  .filters { padding: 10px 12px; display: flex; flex-wrap: wrap; gap: 8px; }
  .filters select, .filters input {
    padding: 6px 8px; border: 1px solid #c2cad4; border-radius: 4px; font-size: 13px;
  }
  .filters input[type=text] { flex: 1 1 140px; min-width: 120px; }
  .count { padding: 0 12px 8px; color: #555; font-size: 12px; }
  /* ---- 사고 목록 ---- */
  .listbox { max-height: 70vh; overflow: auto; border-top: 1px solid #eef1f5; }
  table.list { width: 100%; border-collapse: collapse; }
  table.list th, table.list td {
    padding: 6px 8px; border-bottom: 1px solid #eef1f5; text-align: left;
    font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  table.list th { position: sticky; top: 0; background: #fafbfc; color: #555; font-weight: 600; }
  table.list tr { cursor: pointer; }
  table.list tr:hover td { background: #eaf2fb; }
  table.list tr.sel td { background: #d7e8fb; }
  td.place { max-width: 170px; }
  /* ---- 오른쪽: 양식 선택 ---- */
  .toolbar { padding: 10px 12px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .toolbar .seg button {
    border: 1px solid #1f4e79; background: #fff; color: #1f4e79;
    padding: 6px 12px; cursor: pointer; font-size: 13px;
  }
  .toolbar .seg button:first-child { border-radius: 4px 0 0 4px; }
  .toolbar .seg button:last-child { border-radius: 0 4px 4px 0; border-left: none; }
  .toolbar .seg button.on { background: #1f4e79; color: #fff; }
  .btn {
    border: none; border-radius: 4px; padding: 7px 14px; cursor: pointer; font-size: 13px;
  }
  .btn-primary { background: #1f4e79; color: #fff; }
  .btn-ghost { background: #e7ebf1; color: #333; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .hint { padding: 0 12px 8px; color: #777; font-size: 12px; }
  .ok-msg { color: #176b2c; font-weight: 600; font-size: 13px; margin-left: 6px; }
  /* ---- 양식 미리보기 영역 ---- */
  #formArea { padding: 16px; overflow: auto; }
  .empty { padding: 40px; text-align: center; color: #999; }

  /* ====== 한글 양식 표 (붙여넣기 대상) ======
     한글에 붙여넣을 때 표 모양이 유지되도록 인라인+클래스 모두 단순하게 둔다. */
  .hwp { width: 720px; max-width: 100%; border-collapse: collapse; background: #fff;
         font-family: "맑은 고딕","Malgun Gothic",sans-serif; font-size: 13px; }
  .hwp td, .hwp th { border: 1px solid #000; padding: 5px 7px; vertical-align: middle; }
  .hwp .title { text-align: center; font-size: 18px; font-weight: bold; padding: 10px; }
  .hwp .lbl { background: #f2f2f2; font-weight: bold; text-align: center; white-space: nowrap; }
  .hwp .val { background: #fff; }
  .hwp .val[contenteditable]:focus { outline: 2px solid #1f4e79; background: #fffbe6; }
  .hwp .multiline { white-space: pre-wrap; line-height: 1.7; }
  .editnote { color: #888; font-size: 12px; margin: 8px 2px; }
  @media print {
    header, #leftPanel, .toolbar, .hint, .editnote { display: none !important; }
    body { background: #fff; }
    .wrap { padding: 0; }
    #rightPanel { border: none; }
  }
</style>
</head>
<body>
<header>
  <h1>설악산 안전사고 보고서 자동작성</h1>
  <span class="sub">Excel에서 사고를 고르면 한글 양식대로 표를 만들어 드립니다.</span>
</header>

<div class="wrap">
  <!-- ============ 왼쪽: 사고 목록 ============ -->
  <div class="panel" id="leftPanel">
    <h2>① 사고 선택</h2>
    <div class="filters">
      <select id="fYear"></select>
      <select id="fDistrict"></select>
      <select id="fCause"></select>
      <input type="text" id="fText" placeholder="장소·내용 검색">
    </div>
    <div class="count" id="count"></div>
    <div class="listbox">
      <table class="list">
        <thead><tr><th>일자</th><th>장소</th><th>원인</th><th>부상유형</th></tr></thead>
        <tbody id="listBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ============ 오른쪽: 양식 ============ -->
  <div class="panel" id="rightPanel">
    <h2>② 양식 만들기</h2>
    <div class="toolbar">
      <div class="seg">
        <button id="tab2" class="on">서식2호(구조출동)</button>
        <button id="tab1">서식1호(안전지원)</button>
      </div>
      <button class="btn btn-primary" id="btnDownload" disabled>한글파일 다운로드(.doc)</button>
      <button class="btn btn-ghost" id="btnCopy" disabled>한글로 복사</button>
      <button class="btn btn-ghost" id="btnPrint" disabled>인쇄/PDF</button>
      <span class="ok-msg" id="okMsg"></span>
    </div>
    <div class="hint">표의 빈칸(신고자·연락처 등)은 클릭해서 직접 입력한 뒤 내려받으세요. 받은 <b>.doc 파일은 한글에서 그대로 열립니다.</b> (또는 '한글로 복사' → 한글에서 Ctrl+V)</div>
    <div id="formArea">
      <div class="empty">왼쪽에서 사고를 선택하세요.</div>
    </div>
  </div>
</div>

<script>
"use strict";
/* ======================================================================
   1) 데이터 로드
   ====================================================================== */
var RECORDS = [];
try {
  RECORDS = JSON.parse(document.getElementById("DATA").textContent || "[]");
} catch (e) {
  RECORDS = [];
  alert("데이터를 읽지 못했습니다: " + e);
}

/* 엑셀 컬럼 → 짧은 키 의미 (참고용)
   report 본사보고 / year 년 / month 월 / day 일 / dow 요일 / weather 날씨 / temp 기온
   dispatch 출동 / t_occur 발생시간 / t_dispatch 출동시간 / t_arrive 도착시간
   t_done 완료시간 / t_elapsed 출동경과 / t_total 총경과시간 / dist 출동거리(km,왕복)
   lon X_경도 / lat Y_위도 / district 관리지구 / trail 탐방로구간 / place 장소
   placetype 장소구분 / causecat 원인분류 / cause 사고원인 / injury 부상유형
   result 사망_부상_기타 / sex 성별 / age 나이 / nationality 내외국인 / rescue 구조방법
   night 야간구조 / emcall 비상소집 / sp_n 특)출동인원 / sp_members 특)출동대원
   np_n 국립공원출동인원 / etc_n 기타출동인원 / note 특이사항 */

/* ======================================================================
   2) 작은 도우미 함수들 (값이 없을 때 안 깨지게 방어적으로)
   ====================================================================== */
function S(v){ return (v===undefined || v===null) ? "" : String(v); }       // 안전 문자열
function pad2(n){ n = parseInt(n,10); return (n<10?"0":"")+n; }
function esc(s){ return S(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* 사고일시 표기 : "26년 6월 21일(일) 13:00" */
function fmtDate(r){
  var y = S(r.year), m = S(r.month), d = S(r.day), w = S(r.dow);
  var yy = y.length===4 ? y.slice(2) : y;
  var s = yy + "년 " + m + "월 " + d + "일";
  if (w) s += "(" + w + ")";
  if (r.t_occur) s += " " + S(r.t_occur);
  return s;
}
/* 목록용 짧은 날짜 : "26-06-21" */
function fmtShort(r){
  var y = S(r.year), yy = y.length===4 ? y.slice(2) : y;
  return yy + "-" + pad2(r.month) + "-" + pad2(r.day);
}

/* 십진수 좌표 → 도분초(DMS). 예: 38.162908 → 38°09'46.5" */
function toDMS(dec){
  var n = parseFloat(dec);
  if (isNaN(n)) return "";
  var deg = Math.floor(n);
  var minFloat = (n - deg) * 60;
  var min = Math.floor(minFloat);
  var sec = ((minFloat - min) * 60).toFixed(1);
  return deg + "°" + pad2(min) + "'" + (parseFloat(sec)<10?"0":"") + sec + '"';
}
/* 좌표 한 줄 : "위도 38°09'46.5\" N  경도 128°29'06.3\" E" */
function fmtCoord(r){
  if (!r.lat && !r.lon) return "";
  var out = [];
  if (r.lat) out.push(toDMS(r.lat) + " N");
  if (r.lon) out.push(toDMS(r.lon) + " E");
  return out.join("  ");
}

/* 나이 → 연령대(서식1호 체크박스용) : "10대 이하","20대",...,"60대 이상" */
function ageBucket(age){
  var a = parseInt(age,10);
  if (isNaN(a)) return "";
  if (a < 20) return "10대 이하";
  if (a >= 60) return "60대 이상";
  return (Math.floor(a/10)*10) + "대";
}

/* 체크박스 묶음 만들기 : 보기 배열 중 sel 과 일치하면 ■, 아니면 □ */
function checks(options, sel){
  return options.map(function(o){
    return (o === sel ? "■ " : "□ ") + o;
  }).join("   ");
}

/* 부상유형 텍스트를 서식1호 분류로 매핑 (대략적 키워드 기반) */
function injuryCategory(injury){
  var t = S(injury);
  if (/염좌|삠|접질/.test(t)) return "염좌";
  if (/타박|멍/.test(t)) return "타박상";
  if (/찰과|긁힘|쓸림|상처/.test(t)) return "찰과상";
  if (/통증|아픔|경련|쥐/.test(t)) return "통증";
  if (/조난|길잃|실종/.test(t)) return "조난";
  if (/지병|기저질환|당뇨|혈압|심장/.test(t)) return "지병";
  return "기타";
}
/* 구조방법 → 서식1호 지원유형 매핑 */
function supportCategory(rescue){
  var t = S(rescue);
  if (/약품|파스|밴드|붕대|처치/.test(t)) return "구급약품지원";
  if (/스틱|지팡이|아이젠|장비|들것|업기|부축/.test(t)) return "안전장비지원";
  if (/식수|물|초코|행동식|식품/.test(t)) return "식품지원";
  if (/차량|차/.test(t)) return "차량지원";
  return "기타";
}

/* 시간대별 조치내용 자동 생성 (있는 시간만 줄 단위로) */
function buildActions(r){
  var lines = [];
  if (r.t_occur)    lines.push("- " + S(r.t_occur) + "  사고 발생 / 신고 접수");
  if (r.t_dispatch) lines.push("- " + S(r.t_dispatch) + "  구조대 출동");
  if (r.t_arrive)   lines.push("- " + S(r.t_arrive) + "  현장 도착");
  if (r.t_done)     lines.push("- " + S(r.t_done) + "  상황 종료");
  if (r.note)       lines.push("- 특이사항: " + S(r.note));
  return lines.join("\n");
}

/* 동원인원 자동 생성 */
function buildPersonnel(r){
  var parts = [];
  var total = (parseInt(r.sp_n,10)||0) + (parseInt(r.np_n,10)||0) + (parseInt(r.etc_n,10)||0);
  if (total) parts.push("[총 " + total + "명]");
  if (r.sp_n) {
    var sp = "특수구조대 " + r.sp_n + "명";
    if (r.sp_members) sp += "(" + S(r.sp_members) + ")";
    parts.push(sp);
  }
  if (r.np_n)  parts.push("국립공원 " + r.np_n + "명");
  if (r.etc_n) parts.push("기타(유관기관 등) " + r.etc_n + "명");
  return parts.join("  ");
}

/* 사고경위 한 문장 자동 생성 */
function buildSummary(r){
  var who = "사고자";
  var sg = [];
  if (r.sex) sg.push(S(r.sex));
  if (r.age) sg.push(S(r.age) + "세");
  if (sg.length) who += "(" + sg.join("/") + ")";
  var loc = [S(r.district), S(r.place)].filter(Boolean).join(" ");
  var s = who + "는 " + loc;
  if (r.cause) s += "에서 " + S(r.cause) + "(으)로";
  if (r.injury) s += " " + S(r.injury) + " 증상이 발생";
  s += "하여 구조 출동한 건임.";
  return s;
}

/* ======================================================================
   3) 양식 표 HTML 만들기
   ====================================================================== */
/* 값 칸 (클릭해서 수정 가능) */
function v(content, span){
  var c = span ? (' colspan="'+span+'"') : "";
  return '<td class="val"' + c + ' contenteditable="true">' + esc(content) + '</td>';
}
function vML(content, span){ /* 여러 줄 칸 */
  var c = span ? (' colspan="'+span+'"') : "";
  return '<td class="val multiline"' + c + ' contenteditable="true">' + esc(content) + '</td>';
}
function L(text, span){
  var c = span ? (' colspan="'+span+'"') : "";
  return '<td class="lbl"' + c + '>' + esc(text) + '</td>';
}

/* ---- 서식2호 : 탐방객 구조출동 현황 ---- */
function form2(r){
  var h = '<table class="hwp"><colgroup>' +
    '<col style="width:14%"><col style="width:19%"><col style="width:17%">' +
    '<col style="width:17%"><col style="width:16%"><col style="width:17%"></colgroup>';
  // 제목
  h += '<tr><td class="title" colspan="6">탐방객 구조출동 현황</td></tr>';
  // 결재칸
  h += '<tr>' + L("결재") +
       '<td colspan="5"><table style="width:100%;border-collapse:collapse">' +
       '<tr>' + ["직원","팀장","과장","소장"].map(function(x){
          return '<td class="lbl" style="border:1px solid #000;width:25%">'+x+'</td>';}).join("") + '</tr>' +
       '<tr>' + ["","","",""].map(function(){
          return '<td style="border:1px solid #000;height:38px"></td>';}).join("") + '</tr>' +
       '</table></td></tr>';
  // 사고일시 / 접수경로 / 출동거리
  h += '<tr>' + L("사고일시") + v(fmtDate(r)) +
       L("접수경로") + v(S(r.dispatch) || "119") +
       L("출동거리") + v(r.dist ? (r.dist + "km") : "") + '</tr>';
  // 사고장소 / 세부위치
  var loc = [S(r.district), S(r.trail)].filter(Boolean).join(" → ");
  h += '<tr>' + L("사고장소") + v(loc, 3) + L("세부위치") + v(S(r.place), 1) + '</tr>';
  // 좌표 / 탐방로여부 / 위치표지판
  h += '<tr>' + L("좌표") + v(fmtCoord(r), 3) +
       L("탐방로여부") + v(S(r.placetype) === "정" ? "탐방로" : (S(r.placetype) || ""), 1) + '</tr>';
  // 신고자
  h += '<tr>' + L("신고자") + L("성명") + v("") + L("연락처") + v("") +
       L("관계") + v("") + '</tr>';
  // 사고자 인적사항
  h += '<tr>' + L("사고자") + L("연령") + v(r.age ? (r.age + "세") : "") +
       L("성별") + v(S(r.sex)) + L("거주지") + v("") + '</tr>';
  h += '<tr>' + L("인적사항") + L("성명") + v("") + L("연락처") + v("") +
       L("국적") + v(S(r.nationality) || "내국인") + '</tr>';
  // 사고원인 / 부상유형
  h += '<tr>' + L("사고원인") + v(S(r.cause) || S(r.causecat), 5) + '</tr>';
  h += '<tr>' + L("부상유형") + v(S(r.injury), 5) + '</tr>';
  // 사고경위
  h += '<tr>' + L("사고경위") + vML(buildSummary(r), 5) + '</tr>';
  // 조치내용
  h += '<tr>' + L("조치내용 (시간대별)") + vML(buildActions(r), 5) + '</tr>';
  // 동원인원
  h += '<tr>' + L("동원인원") + vML(buildPersonnel(r), 5) + '</tr>';
  h += '</table>';
  return h;
}

/* ---- 서식1호 : 탐방객 안전지원 활동 현황 ---- */
function form1(r){
  var injOpts = ["지병","염좌","타박상","찰과상","통증","조난","기타"];
  var supOpts = ["구급약품지원","안전장비지원","식품지원","차량지원","기타"];
  var sexOpts = ["남성","여성","모름"];
  var ageOpts = ["10대 이하","20대","30대","40대","50대","60대 이상","모름"];
  var sexSel = S(r.sex) === "남" ? "남성" : (S(r.sex) === "여" ? "여성" : "모름");

  var h = '<table class="hwp"><colgroup><col style="width:16%"><col style="width:84%"></colgroup>';
  h += '<tr><td class="title" colspan="2">탐방객 안전지원 활동 현황</td></tr>';
  h += '<tr>' + L("담당자") + v("") + '</tr>';
  h += '<tr>' + L("일시") + v(fmtDate(r)) + '</tr>';
  h += '<tr>' + L("장소") + v([S(r.district), S(r.place)].filter(Boolean).join(" ")) + '</tr>';
  h += '<tr>' + L("부상유형") + v(checks(injOpts, injuryCategory(r.injury))) + '</tr>';
  h += '<tr>' + L("지원유형") + v(checks(supOpts, supportCategory(r.rescue))) + '</tr>';
  h += '<tr>' + L("성별") + v(checks(sexOpts, sexSel)) + '</tr>';
  h += '<tr>' + L("연령대") + v(checks(ageOpts, ageBucket(r.age))) + '</tr>';
  h += '<tr>' + L("내용") + vML(S(r.note) || buildSummary(r)) + '</tr>';
  h += '<tr>' + L("지원자") + v(S(r.sp_members)) + '</tr>';
  h += '</table>';
  return h;
}

/* ======================================================================
   4) 화면 상태 & 렌더링
   ====================================================================== */
var state = { selected: null, form: 2, filtered: [] };

/* 필터 드롭다운 채우기 */
function uniqueSorted(key){
  var set = {};
  RECORDS.forEach(function(r){ var x = S(r[key]); if (x) set[x] = true; });
  return Object.keys(set).sort();
}
function fillSelect(el, label, values, reverse){
  var opts = ['<option value="">'+label+'</option>'];
  if (reverse) values = values.slice().reverse();
  values.forEach(function(v){ opts.push('<option value="'+esc(v)+'">'+esc(v)+'</option>'); });
  el.innerHTML = opts.join("");
}

function applyFilter(){
  var y = document.getElementById("fYear").value;
  var d = document.getElementById("fDistrict").value;
  var c = document.getElementById("fCause").value;
  var t = document.getElementById("fText").value.trim();
  state.filtered = RECORDS.filter(function(r){
    if (y && S(r.year) !== y) return false;
    if (d && S(r.district) !== d) return false;
    if (c && S(r.causecat) !== c) return false;
    if (t) {
      var hay = [r.place, r.trail, r.note, r.cause, r.injury].map(S).join(" ");
      if (hay.indexOf(t) === -1) return false;
    }
    return true;
  });
  renderList();
}

function renderList(){
  var rows = state.filtered;
  document.getElementById("count").textContent = "총 " + rows.length + "건";
  var html = [];
  // 최신순(아래쪽이 최신) → 역순 표시
  for (var i = rows.length - 1; i >= 0; i--){
    var r = rows[i];
    var idx = RECORDS.indexOf(r);
    html.push(
      '<tr data-i="' + idx + '">' +
      '<td>' + esc(fmtShort(r)) + '</td>' +
      '<td class="place" title="' + esc(r.place) + '">' + esc(r.place) + '</td>' +
      '<td>' + esc(r.causecat) + '</td>' +
      '<td>' + esc(r.injury) + '</td></tr>'
    );
  }
  var body = document.getElementById("listBody");
  body.innerHTML = html.join("") || '<tr><td colspan="4" style="padding:20px;color:#999">조건에 맞는 사고가 없습니다.</td></tr>';
  // 행 클릭 연결
  Array.prototype.forEach.call(body.querySelectorAll("tr[data-i]"), function(tr){
    tr.addEventListener("click", function(){
      selectRecord(parseInt(tr.getAttribute("data-i"), 10), tr);
    });
  });
}

function selectRecord(idx, tr){
  state.selected = RECORDS[idx];
  var body = document.getElementById("listBody");
  Array.prototype.forEach.call(body.querySelectorAll("tr"), function(x){ x.classList.remove("sel"); });
  if (tr) tr.classList.add("sel");
  renderForm();
}

function renderForm(){
  var area = document.getElementById("formArea");
  document.getElementById("okMsg").textContent = "";
  if (!state.selected){
    area.innerHTML = '<div class="empty">왼쪽에서 사고를 선택하세요.</div>';
    document.getElementById("btnDownload").disabled = true;
    document.getElementById("btnCopy").disabled = true;
    document.getElementById("btnPrint").disabled = true;
    return;
  }
  var html = (state.form === 2) ? form2(state.selected) : form1(state.selected);
  area.innerHTML = html +
    '<div class="editnote">※ 빈칸이나 자동작성 내용은 표 안을 클릭해서 직접 수정할 수 있습니다.</div>';
  document.getElementById("btnDownload").disabled = false;
  document.getElementById("btnCopy").disabled = false;
  document.getElementById("btnPrint").disabled = false;
}

/* ======================================================================
   5) 한글로 복사 (서식 있는 표를 클립보드에 HTML로 복사)
   ====================================================================== */
function copyToHwp(){
  var table = document.querySelector("#formArea table.hwp");
  if (!table) return;
  var okMsg = document.getElementById("okMsg");
  var html = '<meta charset="utf-8">' + table.outerHTML;
  var text = table.innerText;

  function done(){ okMsg.textContent = "복사됨! 한글에서 Ctrl+V"; setTimeout(function(){ okMsg.textContent=""; }, 4000); }
  function fail(){ legacyCopy(html, text, okMsg); }

  // 최신 브라우저: 서식(HTML) 포함 복사
  if (navigator.clipboard && window.ClipboardItem){
    try {
      var item = new ClipboardItem({
        "text/html": new Blob([html], {type:"text/html"}),
        "text/plain": new Blob([text], {type:"text/plain"})
      });
      navigator.clipboard.write([item]).then(done, fail);
      return;
    } catch(e){ /* 아래 대체 방식으로 */ }
  }
  legacyCopy(html, text, okMsg);
}

/* 구형 브라우저 대체: 선택 후 execCommand('copy') */
function legacyCopy(html, text, okMsg){
  try {
    var holder = document.createElement("div");
    holder.style.position = "fixed"; holder.style.left = "-9999px";
    holder.innerHTML = html;
    document.body.appendChild(holder);
    var range = document.createRange();
    range.selectNodeContents(holder);
    var sel = window.getSelection();
    sel.removeAllRanges(); sel.addRange(range);
    var ok = document.execCommand("copy");
    sel.removeAllRanges();
    document.body.removeChild(holder);
    okMsg.textContent = ok ? "복사됨! 한글에서 Ctrl+V" : "복사 실패 — 표를 직접 선택해 복사하세요";
    setTimeout(function(){ okMsg.textContent=""; }, 4000);
  } catch(e){
    okMsg.textContent = "복사 실패: " + e;
  }
}

/* ======================================================================
   5-2) 한글파일(.doc) 다운로드
        - 한글(HWP)은 Word(.doc) HTML 파일을 그대로 열 수 있다.
        - 외부 라이브러리 없이, 표가 들어간 Word용 HTML을 만들어 내려받는다.
   ====================================================================== */
function safeName(s){
  /* 파일이름에 못 쓰는 글자 제거 */
  return S(s).replace(/[\\\/:*?"<>|\n\r\t]/g, " ").replace(/\s+/g, " ").trim().slice(0, 40);
}
function downloadDoc(){
  var table = document.querySelector("#formArea table.hwp");
  if (!table || !state.selected) return;
  var r = state.selected;

  // Word/한글이 인식하는 HTML 문서 골격. 표 테두리·배경이 유지되도록 스타일을 함께 넣는다.
  var head =
    '<html xmlns:o="urn:schemas-microsoft-com:office:office" ' +
    'xmlns:w="urn:schemas-microsoft-com:office:word" ' +
    'xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8">' +
    '<style>' +
    'body{font-family:"맑은 고딕",Malgun Gothic,sans-serif;font-size:13px;}' +
    'table{border-collapse:collapse;}' +
    'td,th{border:1px solid #000;padding:5px 7px;vertical-align:middle;}' +
    '.title{text-align:center;font-size:18px;font-weight:bold;padding:10px;}' +
    '.lbl{background:#f2f2f2;font-weight:bold;text-align:center;}' +
    '.multiline{white-space:pre-wrap;line-height:1.7;}' +
    '</style></head><body>';
  var html = head + table.outerHTML + '</body></html>';

  var formName = (state.form === 2) ? "구조출동현황" : "안전지원활동현황";
  var fname = formName + "_" + fmtShort(r) + "_" + safeName(r.place) + ".doc";

  // BOM(﻿) 을 붙여 한글 깨짐 방지
  var blob = new Blob(["﻿", html], {type: "application/msword;charset=utf-8"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);

  var okMsg = document.getElementById("okMsg");
  okMsg.textContent = "다운로드 완료: " + fname;
  setTimeout(function(){ okMsg.textContent=""; }, 5000);
}

/* ======================================================================
   6) 초기화 & 이벤트 연결
   ====================================================================== */
function init(){
  fillSelect(document.getElementById("fYear"), "전체 연도", uniqueSorted("year"), true);
  fillSelect(document.getElementById("fDistrict"), "전체 지구", uniqueSorted("district"));
  fillSelect(document.getElementById("fCause"), "전체 원인", uniqueSorted("causecat"));

  document.getElementById("fYear").addEventListener("change", applyFilter);
  document.getElementById("fDistrict").addEventListener("change", applyFilter);
  document.getElementById("fCause").addEventListener("change", applyFilter);
  document.getElementById("fText").addEventListener("input", applyFilter);

  document.getElementById("tab2").addEventListener("click", function(){
    state.form = 2; this.classList.add("on"); document.getElementById("tab1").classList.remove("on"); renderForm();
  });
  document.getElementById("tab1").addEventListener("click", function(){
    state.form = 1; this.classList.add("on"); document.getElementById("tab2").classList.remove("on"); renderForm();
  });
  document.getElementById("btnDownload").addEventListener("click", downloadDoc);
  document.getElementById("btnCopy").addEventListener("click", copyToHwp);
  document.getElementById("btnPrint").addEventListener("click", function(){ window.print(); });

  applyFilter();
}
init();
</script>
